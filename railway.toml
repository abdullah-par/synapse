[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"

[deploy]
# AssemblyAI transcription of long videos can take up to 3-6 minutes.
# Raise the Uvicorn worker timeout to prevent Railway killing the request early.
healthcheckPath = "/health"
healthcheckTimeout = 300
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port $PORT'"


